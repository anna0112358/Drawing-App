<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8"> <!--REQUIREMENT html attribute 10/10-->
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="length=device-length, initial-scale=1.0">
    <title>Unnamed Drawing</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@svgdotjs/svg.js@3.0/dist/svg.min.js"></script>
    <script src="art.js"></script>
</head>

<body>
    <main> <!--REQUIREMENT html element 6/10-->
        <div>
            <form> <!--REQUIREMENT html element 7/10-->
                <div id="title">
                    <label for="drawingName">Title</label> <!--REQUIREMENT html element 8/10-->
                    <!--REQUIREMENT html attribute 5/10-->
                    <input type="text" id="drawingName" name="drawingName" class="textEntry">
                    <!--REQUIREMENT html element 9/10--> <!--REQUIREMENT html attribute 6/10, 7/10, and 8/10-->
                </div>
                <div>
                    <label for="documentColor">Document Color</label>
                    <input type="color" id="documentColor" name="documentColor" class="colorField" value="#FFFFFF">
                    <!--REQUIREMENT html attribute 9/10-->
                </div>
                <div>
                    <label for="whichShape">Shape</label>
                    <select id="whichShape" name="whichShape"> <!--REQUIREMENT html element 10/10-->
                        <option>Circle</option>
                        <option>Rectangle</option>
                        <option>Ephraim's Weather</option>
                    </select>
                </div>
                <div>
                    <label for="height">Height</label>
                    <input type="number" id="height" name="height" class="textEntry">
                </div>
                <div>
                    <label for="width">Width</label>
                    <input type="number" id="width" name="width" class="textEntry">
                </div>
                <div>
                    <label for="shapeColor">Shape Color</label>
                    <input type="color" id="shapeColor" name="shapeColor" class="colorField">
                </div>
            </form>
            <button id="save">Save Drawing</button>
            <a href="index.html" id="homeButton">Home</a>
        </div>
        <div id="drawingArea">
        </div>
        <span id="cursor"></span>
    </main>
</body>

</html>
